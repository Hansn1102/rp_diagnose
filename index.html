<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>키워드 수요 진단 · 리뷰플레이스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#FAF8F3; --card:#FFFEFB; --ink:#1A1C22; --ink-soft:#6B695F;
    --emerald:#1C6E5A; --emerald-soft:#3E9E84; --red:#D94B2B;
    --taupe:#B7AE9C; --taupe-deep:#8A8270; --line:#E6E0D3; --deep:#0F3B30;
    --display:"Space Grotesk","Pretendard",-apple-system,sans-serif;
    --body:"Pretendard",-apple-system,"Apple SD Gothic Neo",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);
    -webkit-font-smoothing:antialiased;padding:0 0 80px}
  .wrap{max-width:900px;margin:0 auto;padding:0 24px}
  header{padding-top:52px}
  .eyebrow{font-family:var(--display);font-weight:600;font-size:12px;letter-spacing:2px;
    text-transform:uppercase;color:var(--emerald)}
  h1{font-family:var(--display);font-weight:700;font-size:44px;line-height:1.06;
    letter-spacing:-1.2px;margin:14px 0 10px}
  .sub{color:var(--ink-soft);font-size:15px;max-width:560px;line-height:1.5}
  .searchrow{display:flex;gap:10px;margin-top:26px}
